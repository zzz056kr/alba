# P6Spy Configuration

# 실제 드라이버
driverlist=org.mariadb.jdbc.Driver

# 로그 출력 방식 (Slf4j 사용 - Spring Boot 권장)
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# 커스텀 포맷터 (SQL 예쁘게 + 실행시간)
logMessageFormat=com.system.alba.config.P6SpyFormatter

# 날짜 포맷
dateformat=yyyy-MM-dd HH:mm:ss

# 불필요한 카테고리 제외
excludecategories=info,debug,result,resultset

# 실행 시간 임계값 (ms) - 이 시간 이상 걸린 쿼리만 로깅 (0 = 모두 로깅)
executionThreshold=0

# 스택 트레이스 표시 여부 (true면 쿼리 호출 위치 확인 가능)
stacktrace=false

# 한 줄에 출력 (false = 여러 줄로 포맷팅)
singleline=false