<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>우편번호 찾기</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      }
      #wrap {
        width: 100%;
        height: 100%;
      }
    </style>
    <script src="https://t1.kakaocdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  </head>
  <body>
    <div id="wrap"></div>
    <script>
      window.__ALBA_POSTCODE_EVENT__ = '';

      function createExtraAddress(data) {
        let extra = '';
        if (data.userSelectedType === 'R') {
          if (data.bname && /[동로가]$/.test(data.bname)) {
            extra += data.bname;
          }
          if (data.buildingName && data.apartment === 'Y') {
            extra += extra ? ', ' + data.buildingName : data.buildingName;
          }
        }
        return extra ? ' (' + extra + ')' : '';
      }

      function onCompleteAddress(data) {
        const address = data.userSelectedType === 'R'
          ? (data.roadAddress || '')
          : (data.jibunAddress || '');

        const payload = {
          zipCode: data.zonecode || '',
          address1: address,
          roadAddress: data.roadAddress || '',
          jibunAddress: data.jibunAddress || '',
          extraAddress: createExtraAddress(data)
        };

        window.__ALBA_POSTCODE_EVENT__ = JSON.stringify({
          type: 'complete',
          payload: payload
        });
        console.log('__ALBA_POSTCODE__' + JSON.stringify({
          type: 'complete',
          payload: payload
        }));
        window.flutter_inappwebview.callHandler(
          'onCompleteAddress',
          JSON.stringify(payload)
        );
      }

      function onCloseAddress(state) {
        window.__ALBA_POSTCODE_EVENT__ = JSON.stringify({
          type: 'close',
          state: typeof state === 'string' ? state : 'FORCE_CLOSE'
        });
        console.log('__ALBA_POSTCODE__' + JSON.stringify({
          type: 'close',
          state: typeof state === 'string' ? state : 'FORCE_CLOSE'
        }));
        window.flutter_inappwebview.callHandler(
          'onCloseAddress',
          JSON.stringify({ state: typeof state === 'string' ? state : 'FORCE_CLOSE' })
        );
      }

      new daum.Postcode({
        oncomplete: onCompleteAddress,
        onclose: onCloseAddress,
        width: '100%',
        height: '100%',
        maxSuggestItems: 5
      }).embed(document.getElementById('wrap'));
    </script>
  </body>
</html>
